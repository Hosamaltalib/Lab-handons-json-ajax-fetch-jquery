<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jQuery Live Search</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #1F4E79; }
        input { 
            width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ccc; 
            border-radius: 6px; box-sizing: border-box; 
        }
        input:focus { border-color: #2E75B6; outline: none; }
        .result { 
            background: white; border: 1px solid #ddd; border-radius: 6px; 
            padding: 14px; margin-top: 10px; display: none; 
        }
        .result h3 { margin: 0 0 6px; color: #2E75B6; }
        #status { color: #888; font-style: italic; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Live User Search</h1>
    <input type="text" id="searchBox" placeholder="Type a name to search...">
    <p id="status">Loading users...</p>
    <div id="results"></div>

    <script>
        let allUsers = [];

        $(document).ready(function() {
            
            $.get("https://jsonplaceholder.typicode.com/users", function(users) {
                allUsers = users;
                $("#status").text("Type to search " + users.length + " users");
            });

            
            $("#searchBox").keyup(function() {
                const query = $(this).val().toLowerCase().trim();
                const resultsDiv = $("#results");
                resultsDiv.empty();

                if (query === "") {
                    $("#status").text("Type to search " + allUsers.length + " users");
                    return;
                }

                
                const matches = allUsers.filter(user => 
                    user.name.toLowerCase().includes(query) || 
                    user.email.toLowerCase().includes(query)
                );

                if (matches.length === 0) {
                    $("#status").text("No users found for: " + query);
                } else {
                    $("#status").text("Found " + matches.length + " user(s)");
                    matches.forEach(user => {
                        const card = $(`
                            <div class="result">
                                <h3>${user.name}</h3>
                                <p>Email: ${user.email}</p>
                                <p>City: ${user.address.city}</p>
                            </div>
                        `);
                        resultsDiv.append(card);
                        card.fadeIn(500); 
                    });
                }
            });
        });
    </script>
</body>
</html>
