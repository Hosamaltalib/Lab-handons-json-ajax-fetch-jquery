<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Cards - Fetch API</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 20px; }
        h1 { color: #1F4E79; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
        .card { 
            background: white; border-radius: 8px; padding: 20px; 
            width: 250px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }
        .card h3 { color: #2E75B6; margin: 0 0 8px; }
        .card p { color: #555; font-size: 14px; margin: 4px 0; }
        button { 
            display: block; margin: 20px auto; padding: 12px 28px; 
            background: #2E75B6; color: white; border: none; 
            border-radius: 6px; font-size: 16px; cursor: pointer; 
        }
        button:hover { background: #1F4E79; }
        #status { text-align: center; color: #888; font-style: italic; }
    </style>
</head>
<body>

    <h1>User Directory</h1>
    <button onclick="loadUsers()">Load Users</button>
    <p id="status">Click the button to load users</p>
    <div class="grid" id="userGrid"></div>
    <button onclick="loadPosts()">Load 5 Posts</button>

    <script>
        async function loadUsers() {
            const status = document.getElementById("status");
            const grid = document.getElementById("userGrid");

            status.textContent = "Loading...";
            grid.innerHTML = "";

            try {
        
                const response = await fetch("https://jsonplaceholder.typicode.com/users");
                
                if (!response.ok) throw new Error("Failed to fetch users");

                const users = await response.json();
                status.textContent = `Loaded ${users.length} users`;

                users.forEach(user => {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <h3>${user.name}</h3>
                        <p><strong>Email:</strong> ${user.email}</p>
                        <p><strong>Phone:</strong> ${user.phone}</p>
                        <p><strong>City:</strong> ${user.address.city}</p>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                status.textContent = "Error: " + error.message;
                status.style.color = "red";
            }
        }
        async function loadPosts() {
    const grid = document.getElementById("userGrid");
    const status = document.getElementById("status");
    grid.innerHTML = "";
    status.textContent = "Loading posts...";

    try {
        const response = await fetch("https://jsonplaceholder.typicode.com/posts");
        const posts = await response.json();
        
        
        const firstFive = posts.slice(0, 5);
        
        firstFive.forEach(post => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <h3>${post.title}</h3>
                <p>${post.body}</p>
            `;
            grid.appendChild(card);
        });
        status.textContent = "Displaying 5 posts";
    } catch (error) {
        status.textContent = "Error loading posts";
    }
}
    </script>
</body>
</html>
